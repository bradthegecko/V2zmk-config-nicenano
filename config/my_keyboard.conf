# 1. Enable the OLED Display
CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306=y

# 2. Force VCC Power Pin to 3.3V (Fixes the 1.5V issue)
CONFIG_ZMK_EXT_POWER=y

# 3. Boost Bluetooth Signal (Helps your phone find the board)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 4. Disable deep sleep during testing
# This prevents the board from turning off while you're debugging
CONFIG_ZMK_SLEEP=n
